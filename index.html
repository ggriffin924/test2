<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-theme="light">
    <div class="background-glow"></div>
    
    <!-- Status Toast Notifications -->
    <div id="toast-container"></div>

    <div class="dashboard-container">
        <header>
            <div class="header-main">
                <div class="title-group">
                    <h1>Class of 2026: AI Innovators</h1>
                    <p id="current-task">Current Workshop Phase: <span>Collaborative Development</span></p>
                </div>
                <div class="header-actions">
                    <div class="theme-selector">
                        <label for="theme-select">Theme</label>
                        <select id="theme-select">
                            <option value="light">Light</option>
                            <option value="dark">Dark</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <!-- Student Grid -->
            <section class="student-grid" id="student-grid">
                <!-- Dynamically populated by app.js -->
            </section>

            <!-- AI Command Center (Interactive Controls) -->
            <section class="control-panel">
                <div class="panel-card">
                    <div class="panel-header">
                        <h3>AI Command Center</h3>
                        <span id="results-count">Showing All Students</span>
                    </div>
                    
                    <div class="panel-grid">
                        <!-- Search Bar -->
                        <div class="control-group">
                            <label for="search-input">Search Students</label>
                            <input type="text" id="search-input" placeholder="Enter name or skill...">
                        </div>

                        <!-- Role Filter Dropdown -->
                        <div class="control-group">
                            <label for="role-filter">Filter by AI Role</label>
                            <select id="role-filter">
                                <option value="all">All Roles</option>
                                <option value="Frontend Developer">Frontend Developer</option>
                                <option value="AI Researcher">AI Researcher</option>
                                <option value="UI Designer">UI Designer</option>
                                <option value="Backend Engineer">Backend Engineer</option>
                                <option value="Data Scientist">Data Scientist</option>
                                <option value="Fullstack Dev">Fullstack Dev</option>
                                <option value="Course Instructor">Course Instructor</option>
                            </select>
                        </div>
                        
                        <!-- Extra Interactive Dropdown -->
                        <div class="control-group">
                            <label for="sort-by">Sort By</label>
                            <select id="sort-by">
                                <option value="name">Name (A-Z)</option>
                                <option value="role">Role</option>
                                <option value="newest">Newest Added</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>Created with ✨ <strong>Gemini CLI</strong> ✨ | Interactive Dashboard v2.0</p>
        </footer>
    </div>
    <script src="students-data.js"></script>
    <script src="app.js"></script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
