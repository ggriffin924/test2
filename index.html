<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-glow"></div>
    <div class="dashboard-container">
        <header>
            <h1>Class of 2026: AI Innovators</h1>
            <p id="current-task">Current Workshop Phase: <span>Collaborative Development</span></p>
        </header>

        <main>
            <!-- Student Grid -->
            <section class="student-grid" id="student-grid">
                <!-- Dynamically populated by app.js -->
            </section>

            <!-- Chart Section -->
            <section class="chart-section">
                <div class="chart-card">
                    <h3>Student Engagement Trends</h3>
                    <div class="chart-container">
                        <canvas id="engagementChart"></canvas>
                    </div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>Created with ✨ <strong>Gemini CLI</strong> ✨ | Refactored for Personalized Learning</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
